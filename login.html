<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: '#2d8eff', dark: '#0a0a0f', darker: '#06060a' },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">

    <div id="navbar-placeholder"></div>

    <!-- Login Form Section -->
    <section class="min-h-[80vh] flex items-center justify-center px-4 py-20">
        <div class="glass-card-premium w-full max-w-md p-8 sm:p-10" data-aos="fade-up">
            <div class="text-center mb-8">
                <h2 class="text-3xl sm:text-4xl font-bold font-display text-white">Welcome <span class="neon-text">Back</span></h2>
                <p class="text-gray-400 mt-2">Log in to your account to continue</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="email" name="email" required
                               class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 focus:border-neon outline-none transition"
                               placeholder="you@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" name="password" required
                               class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 focus:border-neon outline-none transition"
                               placeholder="Enter your password">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-neon" onclick="togglePassword(this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-gray-400">
                        <input type="checkbox" class="rounded border-gray-600 bg-transparent">
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="text-neon hover:underline">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary w-full py-4 text-base">
                    Sign In <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-400">
                Don't have an account? <a href="register.html" class="text-neon font-medium hover:underline">Create one</a>
            </div>
            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-xs text-gray-500 mb-3">Or continue with</p>
                <div class="flex justify-center gap-4">
                    <button class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-gray-400 hover:border-neon hover:text-neon transition">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-gray-400 hover:border-neon hover:text-neon transition">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl shadow-green-500/30 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        function togglePassword(btn) {
            const input = btn.parentElement.parentElement.querySelector('input');
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.email.value;
            // Simulate login
            localStorage.setItem('currentUser', JSON.stringify({ email, role: 'customer' }));
            showToast('Login successful! Redirecting...');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });
    </script>
</body>
</html>
