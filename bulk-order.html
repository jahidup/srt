<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Order – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { colors: { neon: '#2d8eff' } } } } </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">
    <div id="navbar-placeholder"></div>

    <section class="py-20">
        <div class="max-w-3xl mx-auto px-4">
            <div class="text-center mb-10" data-aos="fade-up">
                <h1 class="text-4xl sm:text-5xl font-bold font-display text-white mb-4">Bulk <span class="neon-text">Order Inquiry</span></h1>
                <p class="text-gray-400">Fill in the details and get an instant quote via WhatsApp</p>
            </div>

            <form id="bulkOrderForm" class="glass-card-premium p-8 space-y-6" data-aos="fade-up">
                <div class="grid sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Institute Name *</label>
                        <input type="text" name="instituteName" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Contact Person *</label>
                        <input type="text" name="contactPerson" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Phone Number *</label>
                        <input type="tel" name="phone" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Email *</label>
                        <input type="email" name="email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Product Type</label>
                        <select name="productType" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                            <option>T‑Shirt</option>
                            <option>Polo</option>
                            <option>Oversized Tee</option>
                            <option>Hoodie</option>
                            <option>Jersey</option>
                            <option>Corporate Uniform</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Quantity *</label>
                        <input type="number" name="quantity" required min="50" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Sizes Required</label>
                        <input type="text" name="sizes" placeholder="e.g., S,M,L,XL" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Deadline</label>
                        <input type="date" name="deadline" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Budget (approx)</label>
                        <input type="text" name="budget" placeholder="e.g., ₹10,000 - ₹15,000" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-sm text-gray-400 mb-1">Describe your requirement</label>
                        <textarea name="message" rows="4" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-4 text-lg">
                    Submit & Chat on WhatsApp <i class="fab fa-whatsapp ml-2"></i>
                </button>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl shadow-green-500/30 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        document.getElementById('bulkOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            const msg = `📦 *Bulk Order*\n🏢 ${data.instituteName}\n👤 ${data.contactPerson}\n📞 ${data.phone}\n📧 ${data.email}\n📦 ${data.productType}\n🔢 ${data.quantity} pcs\n📏 Sizes: ${data.sizes}\n📅 ${data.deadline}\n💰 ${data.budget}\n📝 ${data.message}`;
            window.open(`https://wa.me/918055698328?text=${encodeURIComponent(msg)}`, '_blank');
            alert('Redirecting to WhatsApp...');
        });
    </script>
</body>
</html>
