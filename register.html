<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: '#2d8eff', dark: '#0a0a0f', darker: '#06060a' },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">

    <div id="navbar-placeholder"></div>

    <!-- Registration Form Section -->
    <section class="min-h-[80vh] flex items-center justify-center px-4 py-20">
        <div class="glass-card-premium w-full max-w-md p-8 sm:p-10" data-aos="fade-up">
            <div class="text-center mb-8">
                <h2 class="text-3xl sm:text-4xl font-bold font-display text-white">Create <span class="neon-text">Account</span></h2>
                <p class="text-gray-400 mt-2">Join us and start your custom printing journey</p>
            </div>
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Full Name</label>
                    <input type="text" name="fullName" required
                           class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:border-neon outline-none"
                           placeholder="Your full name">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email</label>
                    <input type="email" name="email" required
                           class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:border-neon outline-none"
                           placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Phone Number</label>
                    <input type="tel" name="phone" required
                           class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:border-neon outline-none"
                           placeholder="+91 9876543210">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:border-neon outline-none"
                           placeholder="Minimum 6 characters">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
                    <input type="password" name="confirmPassword" required minlength="6"
                           class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:border-neon outline-none"
                           placeholder="Re-enter password">
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <input type="checkbox" required class="rounded border-gray-600 bg-transparent">
                    I agree to the <a href="#" class="text-neon hover:underline">Terms</a> &amp; <a href="#" class="text-neon hover:underline">Privacy Policy</a>
                </div>
                <button type="submit" class="btn-primary w-full py-4 text-base">
                    Create Account <i class="fas fa-user-plus ml-2"></i>
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-400">
                Already have an account? <a href="login.html" class="text-neon font-medium hover:underline">Sign in</a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl shadow-green-500/30 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = this.password.value;
            const confirm = this.confirmPassword.value;
            if (password !== confirm) {
                showToast('Passwords do not match!', 'error');
                return;
            }
            // Simulate registration
            const user = {
                fullName: this.fullName.value,
                email: this.email.value,
                phone: this.phone.value
            };
            localStorage.setItem('currentUser', JSON.stringify({ ...user, role: 'customer' }));
            showToast('Registration successful! Redirecting...');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });
    </script>
</body>
</html>
