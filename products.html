<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Same head as index.html, except title -->
    <title>Products – Your Brand</title>
    <!-- all stylesheets and scripts same as index.html -->
</head>
<body class="bg-[#06060a] text-gray-200">
    <div id="navbar-placeholder"></div>

    <section class="py-20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-14" data-aos="fade-up">
                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold font-display text-white mb-4">All <span class="neon-text">Products</span></h1>
                <p class="text-gray-400 max-w-xl mx-auto">Complete catalog – click on any product for full details, color options, and quick inquiry.</p>
            </div>
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="allProductsGrid">
                <!-- rendered by JS -->
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl shadow-green-500/30 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        const grid = document.getElementById('allProductsGrid');
        if (grid && typeof productDatabase !== 'undefined') {
            grid.innerHTML = productDatabase.map(p => `
            <div class="glass-card p-5 group" data-aos="fade-up">
                <div class="relative h-52 rounded-xl overflow-hidden mb-4">
                    <img src="${p.images[0]}" alt="${p.name}" class="h-full w-full object-cover group-hover:scale-110 transition duration-500">
                    <span class="absolute top-3 left-3 bg-neon text-white text-xs font-bold px-3 py-1 rounded-full">${p.badge}</span>
                </div>
                <p class="text-xs text-neon mb-1">${p.category}</p>
                <h3 class="font-semibold text-white mb-2">${p.name}</h3>
                <p class="text-sm text-gray-400 line-clamp-2">${p.description}</p>
                <div class="flex justify-between items-center mt-3">
                    <span class="text-lg font-bold text-white">₹${p.price}<span class="text-xs text-gray-500">/piece</span></span>
                    <a href="product-detail.html?id=${p.id}" class="btn-outline text-xs py-2 px-4">View Details</a>
                </div>
            </div>
            `).join('');
        }
    </script>
</body>
</html>
