<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { colors: { neon: '#2d8eff' } } } } </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">
    <div id="navbar-placeholder"></div>

    <section class="py-20">
        <div class="max-w-6xl mx-auto px-4">
            <div class="text-center mb-14" data-aos="fade-up">
                <h1 class="text-4xl sm:text-5xl font-bold font-display text-white mb-4">Get in <span class="neon-text">Touch</span></h1>
                <p class="text-gray-400 max-w-lg mx-auto">We'd love to hear from you. Send us a message or reach out directly.</p>
            </div>

            <div class="grid lg:grid-cols-2 gap-10">
                <!-- Contact form -->
                <div class="glass-card p-6 sm:p-8 space-y-5" data-aos="fade-right">
                    <h3 class="text-xl font-semibold text-white mb-2">Send a Message</h3>
                    <form id="contactForm">
                        <div class="grid sm:grid-cols-2 gap-4">
                            <input type="text" placeholder="Your Name" required class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                            <input type="email" placeholder="Your Email" required class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                        </div>
                        <input type="text" placeholder="Subject" class="w-full mt-4 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                        <textarea placeholder="Your message" rows="5" class="w-full mt-4 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none"></textarea>
                        <button type="submit" class="btn-primary w-full mt-4">Send Message <i class="fas fa-paper-plane ml-2"></i></button>
                    </form>
                </div>

                <!-- Contact info -->
                <div class="glass-card p-6 sm:p-8 space-y-8" data-aos="fade-left">
                    <h3 class="text-xl font-semibold text-white mb-2">Contact Information</h3>
                    <div class="space-y-5">
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 bg-neon/10 rounded-lg flex items-center justify-center text-neon"><i class="fas fa-phone"></i></div>
                            <div><p class="text-white font-medium">Phone</p><p class="text-gray-400 text-sm">+91 8055698328</p></div>
                        </div>
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 bg-neon/10 rounded-lg flex items-center justify-center text-neon"><i class="fas fa-envelope"></i></div>
                            <div><p class="text-white font-medium">Email</p><p class="text-gray-400 text-sm">hello@yourbrand.com</p></div>
                        </div>
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 bg-neon/10 rounded-lg flex items-center justify-center text-neon"><i class="fas fa-map-marker-alt"></i></div>
                            <div><p class="text-white font-medium">Address</p><p class="text-gray-400 text-sm">123, Printing Hub, Sector 45, Noida, UP – 201301</p></div>
                        </div>
                    </div>
                    <div class="mt-6">
                        <a href="https://wa.me/918055698328" target="_blank" class="btn-primary bg-green-600 hover:bg-green-700 w-full justify-center">
                            <i class="fab fa-whatsapp"></i> Chat on WhatsApp
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl shadow-green-500/30 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        document.getElementById('contactForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for your message! We will get back to you shortly.');
            this.reset();
        });
    </script>
</body>
</html>
