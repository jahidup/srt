<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: '#2d8eff', dark: '#0a0a0f', darker: '#06060a' },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">

    <div id="navbar-placeholder"></div>

    <!-- Forgot Password Section -->
    <section class="min-h-[80vh] flex items-center justify-center px-4 py-20">
        <div class="glass-card-premium w-full max-w-md p-8 sm:p-10" data-aos="fade-up">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto bg-neon/10 rounded-2xl flex items-center justify-center text-neon text-2xl mb-4">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-3xl sm:text-4xl font-bold font-display text-white">Forgot <span class="neon-text">Password</span>?</h2>
                <p class="text-gray-400 mt-2">Enter your email and we'll send you a reset link</p>
            </div>
            <form id="forgotForm" class="space-y-5">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="email" name="email" required
                               class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 focus:border-neon outline-none"
                               placeholder="you@example.com">
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-4 text-base">
                    Send Reset Link <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-400">
                Remember your password? <a href="login.html" class="text-neon font-medium hover:underline">Back to login</a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl shadow-green-500/30 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.email.value;
            showToast(`Password reset link sent to ${email} (simulated)`);
            this.reset();
        });
    </script>
</body>
</html>
