<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: '#2d8eff', dark: '#0a0a0f', darker: '#06060a' },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

<body class="bg-[#06060a] text-gray-200">

    <div id="navbar-placeholder"></div>

            <div class="flex flex-wrap justify-center gap-4 mt-10">

                <a href="https://wa.me/918055698328" target="_blank" class="btn-outline bg-green-500/10 border-green-500/30 text-green-400 hover:bg-green-500/20">
                    <i class="fab fa-whatsapp"></i> Contact Support
                </a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
